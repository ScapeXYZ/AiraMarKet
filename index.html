<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AIRA MARKETS | AI-Driven Prediction Markets</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
      /* Day and Night Colors (CSS Custom Properties) */
      :root {
          --primary: #c2652a;
          --primary-light: #fdf8f4;
          --primary-muted: #e9dccf;
          --text-main: #2d241e;
          --text-muted: #6b5f56;
          --background: #fffcf9;
          --surface: #ffffff;
          --outline: #e9dccf;
          --outline-variant: #f8f4ee;
          --surface-variant: #fdf8f4;
          --surface-bright: #fdf8f6;
          --surface-container-low: #f8f5f2;
          --surface-container-high: #f0edea;
          --surface-container-highest: #e8e5e2;
          --on-surface-variant: #6b5f56;
      }
      html.dark {
          --primary: #e98243;
          --primary-light: #251d19;
          --primary-muted: #3d342f;
          --text-main: #f7f4f0;
          --text-muted: #a59e97;
          --background: #130f0c;
          --surface: #1d1815;
          --outline: #3d342f;
          --outline-variant: #2a221f;
          --surface-variant: #251d19;
          --surface-bright: #1b1714;
          --surface-container-low: #1c1714;
          --surface-container-high: #2d2521;
          --surface-container-highest: #382e29;
          --on-surface-variant: #a59e97;
      }
      
      html, body, #root {
          margin: 0;
          padding: 0;
          width: 100%;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          box-sizing: border-box;
          transition: background-color 0.3s ease, color 0.3s ease;
      }
      body {
          background-color: var(--background);
          color: var(--text-main);
          font-family: 'Outfit', sans-serif;
      }
      .serif-heading {
          font-family: 'Playfair Display', serif;
      }
      .sahara-card {
          background: var(--surface);
          border: 1px solid var(--outline);
          box-shadow: 0 12px 40px -12px rgba(194, 101, 42, 0.08);
          transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), background-color 0.3s ease, border-color 0.3s ease;
      }
      .sahara-card:hover {
          transform: translateY(-4px);
          border-color: var(--primary);
          box-shadow: 0 20px 40px rgba(194, 101, 42, 0.1);
      }
      .sahara-panel {
          background: var(--surface);
          border: 1px solid var(--outline);
          box-shadow: 0 4px 20px -2px rgba(194, 101, 42, 0.05);
          transition: background-color 0.3s ease, border-color 0.3s ease;
      }
      .sahara-gradient-text {
          background: linear-gradient(135deg, #c2652a 0%, #8a4315 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
      }
      /* Custom Slider Styling Sahara */
      input[type=range]::-webkit-slider-thumb {
          -webkit-appearance: none;
          height: 18px;
          width: 18px;
          border-radius: 50%;
          background: #c2652a;
          cursor: pointer;
          border: 3px solid var(--surface);
          box-shadow: 0 2px 8px rgba(194, 101, 42, 0.3);
          transition: border-color 0.3s ease;
      }
      input[type=range]::-moz-range-thumb {
          height: 18px;
          width: 18px;
          border-radius: 50%;
          background: #c2652a;
          cursor: pointer;
          border: 3px solid var(--surface);
          box-shadow: 0 2px 8px rgba(194, 101, 42, 0.3);
          transition: border-color 0.3s ease;
      }
      @keyframes subtle-float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
      }
      .animate-subtle-float { animation: subtle-float 8s ease-in-out infinite; }
      .marquee-container {
          mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }
      @keyframes marquee {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); }
      }
      .animate-marquee { animation: marquee 40s linear infinite; }

      /* Snap Feed Specific Styles */
      .snap-container {
          scroll-snap-type: y mandatory;
          overflow-y: scroll;
          height: calc(100vh - 80px);
          scrollbar-width: none;
      }
      .snap-container::-webkit-scrollbar {
          display: none;
      }
      .snap-section {
          scroll-snap-align: start;
          scroll-snap-stop: always;
      }
      .sand-pattern {
          background-image: radial-gradient(var(--primary) 0.5px, transparent 0.5px);
          background-size: 32px 32px;
          opacity: 0.03;
      }

      /* AI Market Creator Specific Styles */
      .editorial-shadow {
          box-shadow: 0 4px 20px -2px rgba(194, 101, 42, 0.08);
      }
      .sahara-border {
          border-color: var(--outline-variant);
      }
      .market-card {
          background: var(--surface);
          border: 1px solid var(--outline);
          transition: all 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
      }
      .market-card:hover {
          border-color: var(--primary);
          transform: translateY(-2px);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  fontFamily: {
                      sans: ["Outfit", "sans-serif"],
                      serif: ["Playfair Display", "serif"],
                      mono: ["JetBrains Mono", "monospace"],
                      display: ["Outfit", "sans-serif"],
                      body: ["Outfit", "sans-serif"]
                  },
                  colors: {
                      primary: "var(--primary)",
                      "primary-container": "var(--primary-light)",
                      secondary: "var(--text-muted)",
                      background: "var(--background)",
                      surface: "var(--surface)",
                      "on-surface": "var(--text-main)",
                      "on-surface-variant": "var(--on-surface-variant)",
                      outline: "var(--outline)",
                      "outline-variant": "var(--outline-variant)",
                      "surface-variant": "var(--surface-variant)",
                      "surface-bright": "var(--surface-bright)",
                      "surface-container-low": "var(--surface-container-low)",
                      "surface-container-high": "var(--surface-container-high)",
                      "surface-container-highest": "var(--surface-container-highest)",
                      "bullish-green": "#2a7a50",
                      "bearish-red": "#b33939",
                      "accent-gold": "#d4a373",
                      "bullish": "#4a7c59",
                      "bearish": "#a44a3f",
                      "tertiary": "#d4af37"
                  },
                  borderRadius: {
                      "DEFAULT": "0.5rem",
                      "lg": "0.75rem",
                      "xl": "1rem",
                      "full": "9999px"
                  },
                  spacing: {
                      "margin-desktop": "40px",
                      "margin-mobile": "20px"
                  }
              }
          }
      }
    </script>
  </head>
  <body class="bg-background text-on-surface selection:bg-primary/20 w-full min-h-screen overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
